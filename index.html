<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>State Reset</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: Arial;
  background:#0d0d0d;
  color:white;
  padding:16px;
}

/* LOGO */
.logo {
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:10px;
}

.logo-img {
  width:90px;
  height:90px;
  object-fit:contain;
}

.logo-text {
  font-family:'Orbitron', sans-serif;
  letter-spacing:2px;
  color:#00c896;
  font-size:16px;
  margin-top:6px;
}

button {
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
}

.active {
  background:#00c896;
  color:black;
}

.card {
  margin-top:12px;
  padding:14px;
  background:#1a1a1a;
  border-radius:12px;
  cursor:pointer;
}

.step {
  padding:10px;
  margin:5px 0;
  background:#2a2a2a;
  border-radius:8px;
  cursor:pointer;
}

.selected {
  background:#00c896;
  color:black;
}

.selected .definition {
  color:black;
}

.selected .sim-title {
  color:black;
}

.definition {
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
}

.sim-title {
  color:#00c896;
  font-weight:bold;
}

.env-response {
  border:2px solid #3399ff;
  background:#0f1726;
}

.signal {
  border:2px solid #3399ff;
  background:#0f1726;
}

.signal-title {
  color:#66b3ff;
  font-weight:bold;
}

.baseline {
  border:2px solid #00c896;
  background:#0f1f1a;
}

.baseline-title {
  color:#00c896;
  font-weight:bold;
  font-size:16px;
}

.finish {
  background:#00c896;
  color:black;
  font-weight:bold;
}

.partial {
  background:#333;
  color:#aaa;
}

.delete {
  background:#8b0000;
  padding:6px 10px;
  font-size:12px;
  width:auto;
  margin-top:8px;
}

.arrow {
  position:fixed;
  top:50%;
  right:15px;
  transform:translateY(-50%);
  font-size:28px;
  opacity:0.6;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- FINAL LOGO -->
<div class="logo">
  <img src="logo.png" class="logo-img" onerror="this.style.display='none'">
  <div class="logo-text">STATE RESET</div>
</div>

<button onclick="showMain()">Main</button>
<button onclick="showHistory()">History</button>

<div id="main"></div>
<div id="history" style="display:none;"></div>

<div class="arrow" onclick="scrollDown()">↓</div>

<script>

let states=[];
let selectedProcess=null;
let selected=new Set();
let environment=null;
let fuel=null;
let hydration=null;
let temperature=null;
let history=JSON.parse(localStorage.getItem("history"))||[];
let openDefs=new Set();

history = history.filter(h => h && Array.isArray(h.states));
localStorage.setItem("history", JSON.stringify(history));

function scrollDown(){
window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}

const definitions = {
overheated:"Heat buildup, body feels too warm",
restless:"Constant urge to move or shift",
tired:"Low energy, heavy or slowed down",
overstimulated:"Too much input, mentally crowded",
low:"Drained, low fuel, reduced energy",
stomach:"Uneasy digestion, sensitive gut",
irritable:"Easily bothered, short patience",
fog:"Cloudy thinking, slow or unclear",
lightheaded:"Slight dizziness or unsteady feeling",
activation:"Inner buzz, alert, hard to settle",
cantsleep:"Sleepy but can’t fully switch off",
energized:"Clear energy, ready, steady",
calm:"Even, settled, no pressure"
};

const baselines = {
overheated:"Your system is trying to cool down and reduce overload. The goal is to return to a calmer physical state where your body no longer feels pressured by heat or intensity. You are aiming for physical comfort, lower stimulation, and steadier energy.",
restless:"Your system is carrying excess movement and internal pressure. The goal is not to force complete stillness, but to gradually reduce the urge to constantly shift or react. You are moving toward steadier movement and calmer control.",
tired:"Your body is signaling reduced energy and recovery needs. The goal is to reduce pressure, restore energy, and allow your system to settle without forcing productivity. You are aiming for recovery, softness, and lower demand.",
overstimulated:"Your system has absorbed too much input and needs less pressure and less noise. The goal is to reduce mental crowding so your thoughts and nervous system can organize themselves again. You are moving toward clarity, quiet, and reduced stimulation.",
low:"Your body is running with reduced fuel or support. The goal is to restore stability through nourishment, hydration, and reduced strain. You are aiming for steadier energy and a more supported physical state.",
stomach:"Your digestion and body feel sensitive or unsettled. The goal is to reduce stress on the body and allow digestion to stabilize naturally. You are aiming for physical ease and gentler regulation.",
irritable:"Your system is carrying tension and reduced emotional flexibility. The goal is not suppression, but reducing unnecessary friction and pressure. You are moving toward emotional steadiness and calmer reactions.",
fog:"Your mind feels slowed down, cloudy, or disconnected. The goal is to restore clearer signals through movement, hydration, and reduced overload. You are aiming for clarity, orientation, and steadier focus.",
lightheaded:"Your body is signaling instability or reduced physical grounding. The goal is to stabilize your system and avoid pushing too hard too quickly. You are moving toward steadiness, support, and physical balance.",
activation:"Your nervous system is elevated and highly alert. The goal is to reduce excess activation without collapsing your energy completely. You are aiming for calmer control and more grounded awareness.",
cantsleep:"Your body is tired, but your system has not fully switched into rest mode. The goal is to reduce stimulation and allow sleep pressure to naturally take over. You are moving toward deeper stillness and rest.",
energized:"Your energy is available and functional without becoming overwhelming. The goal is to maintain steady momentum without overextending yourself. You are aiming for balanced movement and controlled energy use.",
calm:"Your system is already relatively stable and regulated. The goal is to preserve steadiness without adding unnecessary stimulation or pressure. You are maintaining presence, stability, and calm awareness."
};

const base = {
overheated:[
["Go to cooler place","Take cool shower","Drink water","Rest"],
["Cold towel","Remove layers","Hydrate","Rest"],
["Rinse face","Sit still","Cool down","Relax"]
],

restless:[
["Walk","Stretch","Move body","Pause"],
["Pace slowly","Release energy","Breathe","Rest"],
["Light movement","Ground","Reduce movement","Still"]
],

tired:[
["Lie down","Close eyes","Reduce stimulation","Sleep"],
["No phone","Relax body","Nap","Rest"],
["Eat light food","Hydrate","Sit quietly","Rest"]
],

overstimulated:[
["Leave environment","Reduce noise","Sit","Rest"],
["No phone","Quiet space","Slow breathing","Rest"],
["Lower input","Sit still","Relax","Recover"]
],

low:[
["Eat","Drink water","Sit upright","Recover"],
["Protein snack","Electrolytes","Sit","Rest"],
["Light meal","Hydrate","Sit","Recover"]
],

stomach:[
["Eat simple food","Drink water","Sit upright","Digest"],
["Small portions","Walk slowly","Sit","Rest"],
["Warm liquids","Sit upright","Wait","Recover"]
],

irritable:[
["Pause","Step away","Sit quietly","Reset"],
["No interaction","Sit alone","Relax","Calm"],
["Walk","Release tension","Sit","Reset"]
],

fog:[
["Drink water","Move lightly","Fresh air","Refocus"],
["Cold splash","Walk","Breathe","Focus"],
["Eat","Hydrate","Move","Reset"]
],

lightheaded:[
["Sit down","Drink water","Stay still","Recover"],
["Eat snack","Electrolytes","Sit upright","Rest"],
["Lower head","Hydrate","Pause movement","Recover"]
],

activation:[
["Sit still","Slow breathing","Lower stimulation","Wait"],
["No phone","Breathe slowly","Calm body","Pause"],
["Ground body","Feet flat","Hands still","Settle"]
],

cantsleep:[
["Lie down","Close eyes","No phone","Stay still"],
["Get comfortable","No phone","Stay still","Rest"],
["No phone","Stay still","Relax","Wait"]
],

energized:[
["Sit upright","Stay relaxed","Low stimulation","Wait"],
["Light movement","Walk slowly","Sit","Relax"],
["Stay calm","Observe body","Breathe","Wait"]
],

calm:[
["Sit upright","Relax body","Slow breathing","Stay present"],
["No urgency","Keep still","Breathe normally","Remain calm"],
["Minimal input","Stay grounded","Observe","Hold state"]
]
};

function toggleState(s){
if(states.includes(s)){
  states = states.filter(x=>x!==s);
  openDefs.delete(s);
}else{
  if(states.length>=2) return;
  states.push(s);
  openDefs.add(s);
}
renderMain();
}

function selectProcess(index, steps){
if(selectedProcess===index){
  selectedProcess=null;
  selected=new Set();
}else{
  selectedProcess=index;
  selected=new Set(steps);
}
renderMain();
}

function toggleStep(text){
if(selected.has(text)) selected.delete(text);
else selected.add(text);

selectedProcess=null;
renderMain();
}

function toggleEnv(e){
environment = environment===e ? null : e;
renderMain();
}

function toggleFuel(v){
fuel = fuel===v ? null : v;
renderMain();
}

function toggleHydration(v){
hydration = hydration===v ? null : v;
renderMain();
}

function toggleTemperature(v){
temperature = temperature===v ? null : v;
renderMain();
}

function saveSession(done=false){
history.unshift({
states:[...states],
steps:[...selected],
environment,
fuel,
hydration,
temperature,
done,
time:new Date().toLocaleString()
});

localStorage.setItem("history",JSON.stringify(history));

states=[];
selected=new Set();
selectedProcess=null;
environment=null;
fuel=null;
hydration=null;
temperature=null;
openDefs.clear();

showHistory();
renderHistory();
}

function renderSteps(list){
return list.map((x)=>`
<div class="step ${selected.has(x)?"selected":""}"
data-step="${x}"
onclick="event.stopPropagation(); toggleStep(this.dataset.step)">
${x}
</div>`).join("");
}

function renderMain(){

let html=`<h3>Identify Your Current State (max 2)</h3>`;

Object.keys(base).forEach(key=>{

let labelMap = {
overheated:"🔥 Overheated",
restless:"⚡ Restless",
tired:"💤 Tired",
overstimulated:"🧠 Overstimulated",
low:"🐸 Low Energy",
stomach:"🍽️ Stomach Off",
irritable:"😤 Irritable",
fog:"🌫️ Brain Fog",
lightheaded:"💫 Lightheaded",
activation:"⚙️ Activation",
cantsleep:"🌙 Can't Sleep",
energized:"🔋 Energized",
calm:"🟢 Calm"
};

let activeClass = states.includes(key) ? "active" : "";

html+=`
<button class="${activeClass}" onclick="toggleState('${key}')">
${labelMap[key]}
</button>
${openDefs.has(key) ? `<div class="definition">${definitions[key]}</div>` : ""}
`;
});

html+=`<h3>Choose Your Physical State</h3>`;

html+=`<div class="definition">Fuel</div>`;
html+=`
<div class="card">
<button class="${fuel==='yes' ? 'active' : ''}" onclick="toggleFuel('yes')">Fueled</button>
<button class="${fuel==='no' ? 'active' : ''}" onclick="toggleFuel('no')">Need Food</button>
</div>`;

html+=`<div class="definition">Hydration</div>`;
html+=`
<div class="card">
<button class="${hydration==='yes' ? 'active' : ''}" onclick="toggleHydration('yes')">Hydrated</button>
<button class="${hydration==='no' ? 'active' : ''}" onclick="toggleHydration('no')">Need Water</button>
</div>`;

html+=`<div class="definition">Temperature</div>`;
["cold","neutral","hot"].forEach(v=>{
let activeClass = temperature===v ? "active" : "";
html+=`<button class="${activeClass}" onclick="toggleTemperature('${v}')">${v}</button>`;
});

html+=`<div class="definition">Environment</div>`;
["supportive","neutral","friction"].forEach(e=>{
let activeClass = environment===e ? "active" : "";
html+=`<button class="${activeClass}" onclick="toggleEnv('${e}')">${e}</button>`;
});

if(states.length>0){

let processes=[];

function applyPhysicalAdjustments(route){
let adjusted=[...route];

const priorityStates = ['lightheaded','overheated','low','stomach'];
const activePriority = states.find(s => priorityStates.includes(s));

if(activePriority==='lightheaded'){
adjusted = adjusted.filter(x =>
!x.toLowerCase().includes('walk') &&
!x.toLowerCase().includes('movement') &&
!x.toLowerCase().includes('move')
);
adjusted.unshift('Stay physically supported');
adjusted.unshift('Avoid sudden movement');
}

if(activePriority==='overheated'){
adjusted = adjusted.filter(x =>
!x.toLowerCase().includes('walk') &&
!x.toLowerCase().includes('movement')
);
adjusted.unshift('Reduce physical intensity');
adjusted.unshift('Cool body first');
}

if(activePriority==='low'){
adjusted.unshift('Stabilize energy before pressure');
}

if(activePriority==='stomach'){
adjusted = adjusted.filter(x =>
!x.toLowerCase().includes('intensity')
);
adjusted.unshift('Reduce digestive stress');
}

if(fuel==='no'){
adjusted.unshift('Eat light food');
adjusted.unshift('Reduce intensity');
}

if(hydration==='no'){
adjusted.unshift('Drink water');
adjusted.unshift('Hydrate first');
}

if(temperature==='hot'){
adjusted.unshift('Cool down body');
adjusted.unshift('Find shade or AC');
}

if(temperature==='cold'){
adjusted.unshift('Warm body gently');
adjusted.unshift('Add layers or movement');
}

return [...new Set(adjusted)];
}

if(states.length===1) {
processes=base[states[0]].map(route=>applyPhysicalAdjustments(route));
}

if(states.length===2){
for(let i=0;i<3;i++){
let merged=[...new Set([...base[states[0]][i],...base[states[1]][i]])];
processes.push(applyPhysicalAdjustments(merged));
}
}

let allSteps=new Set();
const optionLabels = ["A","B","C"];

html+=`<div class="definition">Choose a process route or select individual options below</div>`;

html+=processes.map((p,i)=>{

p.forEach(x=>allSteps.add(x));

let activeClass = selectedProcess===i ? "selected" : "";

return `
<div class="card ${activeClass}" onclick='selectProcess(${i}, ${JSON.stringify(p)})'>
<div class="sim-title">PROCESS ${optionLabels[i]}</div>
${p.map(x=>`<div class="definition">• ${x}</div>`).join("")}
</div>
`;

}).join("");

html+=`
<div class="card">
<b>OPTION BANK</b>
<div class="definition">Choose individual options</div>
${renderSteps([...allSteps])}
</div>`;
}

let baselineText="";

function buildPhysicalSummary(){
let parts=[];

if(fuel==='no') parts.push('Your body likely needs nourishment before deeper regulation becomes reliable.');
if(hydration==='no') parts.push('Hydration support is important right now because reduced hydration can distort physical and nervous system signals.');
if(temperature==='hot') parts.push('Heat and environmental intensity are increasing pressure on your system, so cooling and reduced stimulation matter first.');
if(temperature==='cold') parts.push('Your body may need warmth and physical comfort before settling becomes easier.');
if(environment==='friction') parts.push('Environmental friction is likely increasing nervous system pressure and making regulation harder.');
if(environment==='supportive') parts.push('Your environment currently supports regulation and recovery, which makes stabilization easier.');

return parts.join(' ');
}

if(states.length===1){
baselineText = baselines[states[0]] + ' ' + buildPhysicalSummary();
}

if(states.length===2){

const priorityDescriptions = {
lightheaded:'Physical stabilization takes priority over performance or movement right now.',
overheated:'Cooling and reducing strain are more important than maintaining momentum right now.',
low:'Your system likely needs support and replenishment before pushing further.',
stomach:'Digestive and physical ease should be prioritized before higher stimulation.'
};

const activePriority = states.find(s => Object.keys(priorityDescriptions).includes(s));

let combinedState = `Your system is currently balancing ${states[0]} alongside ${states[1]}. The goal is to move toward a more stable and manageable state without forcing yourself too aggressively.`;

baselineText = combinedState + ' ' + buildPhysicalSummary();

if(activePriority){
baselineText += ' ' + priorityDescriptions[activePriority];
}
}

html+=`
<div class="card baseline">
<div class="baseline-title">🏁 BASELINE</div>
<div class="definition" style="color:#d6ffe8; line-height:1.5; font-size:14px; margin-top:10px;">
${baselineText}
</div>
<button class="finish" onclick="saveSession(true)">Finish</button>
<button class="partial" onclick="saveSession(false)">Save</button>
</div>`;

document.getElementById("main").innerHTML=html;
}

function renderHistory(){
document.getElementById("history").innerHTML =
history.map((h,i)=>`
<div class="card">
<div onclick="openHistory(${i})">
<b>${h.states.join(", ")}</b><br>${h.time}
</div>
<button class="delete" onclick="deleteHistory(event,${i})">Delete</button>
</div>`).join("");
}

function openHistory(i){
states=[...history[i].states];
selected=new Set(history[i].steps||[]);
selectedProcess=null;
environment=history[i].environment;
fuel=history[i].fuel || null;
hydration=history[i].hydration || null;
temperature=history[i].temperature || null;
openDefs=new Set(states);
showMain();
renderMain();
}

function deleteHistory(e,i){
e.stopPropagation();
history.splice(i,1);
localStorage.setItem("history",JSON.stringify(history));
renderHistory();
}

function showMain(){
document.getElementById("main").style.display="block";
document.getElementById("history").style.display="none";
}

function showHistory(){
document.getElementById("main").style.display="none";
document.getElementById("history").style.display="block";
renderHistory();
}

renderMain();

</script>
</body>
</html>
